<script>
const allCards = [
  {d:1, q:"What are the 7 OSI model layers in order?", a:"<strong>Layer 1 – Physical:</strong> raw bits, cables, hubs<br><strong>Layer 2 – Data Link:</strong> frames, MAC addresses, switches<br><strong>Layer 3 – Network:</strong> packets, IP addresses, routers<br><strong>Layer 4 – Transport:</strong> segments, TCP/UDP<br><strong>Layer 5 – Session:</strong> connection setup/teardown<br><strong>Layer 6 – Presentation:</strong> encryption, encoding, compression<br><strong>Layer 7 – Application:</strong> user-facing services (HTTP, DNS, FTP)<br><br><em>Memory: Please Do Not Throw Sausage Pizza Away (bottom-up)</em>"},
  {d:1, q:"What are PDU types at each OSI layer?", a:"<ul><li><strong>L1 Physical:</strong> Bits</li><li><strong>L2 Data Link:</strong> Frames</li><li><strong>L3 Network:</strong> Packets</li><li><strong>L4 Transport:</strong> Segments</li><li><strong>L5–L7:</strong> Data</li></ul>"},
  {d:1, q:"TCP vs UDP — key differences?", a:"<strong>TCP (Transmission Control Protocol)</strong><ul><li>Connection-oriented (three-way handshake)</li><li>Reliable — ACKs, retransmissions, ordering</li><li>Slower but accurate</li><li>Used by: HTTP, FTP, SMTP, SSH</li></ul><strong>UDP (User Datagram Protocol)</strong><ul><li>Connectionless, no handshake</li><li>Fast but no delivery guarantee</li><li>Used by: DNS, DHCP, VoIP, streaming, SNMP</li></ul>"},
  {d:1, q:"What are the four types of network traffic?", a:"<ul><li><strong>Unicast:</strong> One-to-one (most common)</li><li><strong>Broadcast:</strong> One-to-all on local network (IPv4 only)</li><li><strong>Multicast:</strong> One-to-many specific group (224.0.0.0/4)</li><li><strong>Anycast:</strong> One-to-nearest instance — used in IPv6 and DNS</li></ul>"},
  {d:1, q:"What are the private IPv4 ranges and APIPA?", a:"<strong>Private ranges (RFC 1918):</strong><ul><li>10.0.0.0/8 — Class A (large)</li><li>172.16.0.0/12 — Class B (medium)</li><li>192.168.0.0/16 — Class C (home/office)</li></ul><strong>APIPA:</strong> 169.254.0.0/16 — auto-assigned when DHCP fails; local-only<br><strong>Loopback:</strong> 127.0.0.1 — tests local TCP/IP stack"},
  {d:1, q:"What does DHCP do and what is the DORA process?", a:"DHCP automatically assigns IP configuration to clients.<br><br><strong>DORA process:</strong><ul><li><strong>D</strong>iscover — client broadcasts looking for DHCP server</li><li><strong>O</strong>ffer — server offers an IP address</li><li><strong>R</strong>equest — client requests the offered IP</li><li><strong>A</strong>cknowledge — server confirms the lease</li></ul>Assigns: IP address, subnet mask, default gateway, DNS server"},
  {d:1, q:"What is DNS and what are its key record types?", a:"DNS (Domain Name System) resolves domain names to IP addresses.<br><br><strong>Record types:</strong><ul><li><strong>A</strong> — IPv4 address</li><li><strong>AAAA</strong> — IPv6 address</li><li><strong>CNAME</strong> — alias for another domain</li><li><strong>MX</strong> — mail server</li><li><strong>PTR</strong> — reverse DNS (IP → name)</li><li><strong>NS</strong> — authoritative name server</li></ul>Port: 53 (UDP/TCP)"},
  {d:1, q:"What is NAT and how does PAT differ?", a:"<strong>NAT (Network Address Translation):</strong> Translates private IPs to a public IP for internet access. Conserves IPv4 addresses and adds security.<br><br><strong>PAT (Port Address Translation):</strong> A form of NAT where many internal devices share one public IP, distinguished by different port numbers. Also called overloading."},
  {d:1, q:"Common protocols and their port numbers?", a:"<ul><li>FTP 20/21 TCP | SFTP 22 TCP | SSH 22 TCP</li><li>Telnet 23 TCP | SMTP 25 TCP | DNS 53 UDP/TCP</li><li>DHCP 67/68 UDP | TFTP 69 UDP | HTTP 80 TCP</li><li>POP3 110 TCP | NTP 123 UDP | IMAP 143 TCP</li><li>SNMP 161/162 UDP | HTTPS 443 TCP | SMB 445 TCP</li><li>LDAP 389 | LDAPS 636 | RDP 3389 TCP</li><li>Syslog 514 UDP | Kerberos 88 TCP/UDP</li></ul>"},
  {d:1, q:"What are the cloud service models (IaaS, PaaS, SaaS)?", a:"<strong>IaaS (Infrastructure as a Service):</strong> Virtualized hardware — you manage OS, apps, data. Examples: AWS EC2, Azure VMs.<br><br><strong>PaaS (Platform as a Service):</strong> Provider manages OS/infrastructure — you manage apps and data. Examples: Heroku, Google App Engine.<br><br><strong>SaaS (Software as a Service):</strong> Provider manages everything — you just use it. Examples: Gmail, Office 365, Salesforce."},
  {d:1, q:"What cloud deployment models exist?", a:"<ul><li><strong>Public:</strong> Shared infrastructure, internet-accessible, multi-tenant</li><li><strong>Private:</strong> Dedicated to one organization, on-prem or hosted</li><li><strong>Hybrid:</strong> Mix of public and private — data/apps move between them</li><li><strong>Community:</strong> Shared by organizations with common interests</li></ul><strong>Cloud connectivity:</strong> VPN (encrypted over internet), Direct Connect/ExpressRoute (private dedicated), VPC (isolated virtual network)"},
  {d:1, q:"What are SDN, SD-WAN, SASE, and Zero Trust?", a:"<strong>SDN (Software Defined Networking):</strong> Centralizes control plane; uses APIs/controllers (OpenFlow). Separates control from data plane.<br><br><strong>SD-WAN:</strong> Software-driven WAN routing; policy-based traffic over multiple links.<br><br><strong>SASE (Secure Access Service Edge):</strong> SD-WAN + cloud security enforced at the edge.<br><br><strong>Zero Trust:</strong> 'Never trust, always verify' — every user/device must authenticate regardless of location; micro-segmentation."},
  {d:1, q:"What are common network topologies?", a:"<ul><li><strong>Star:</strong> All connect to central switch — most common modern design</li><li><strong>Bus:</strong> Single backbone — legacy, single point of failure</li><li><strong>Ring:</strong> Nodes in circular loop — data passes through each</li><li><strong>Mesh:</strong> Every node connects to every other — high redundancy</li><li><strong>Hybrid:</strong> Combination of topologies</li></ul><strong>Network types:</strong> LAN (local), WAN (wide area), MAN (city), CAN (campus), PAN (personal/Bluetooth)"},
  {d:2, q:"What is a VLAN and how does trunking work?", a:"<strong>VLAN:</strong> Logically segments a network at Layer 2 — each VLAN is a separate broadcast domain. IDs range 1–4094 (1 = default).<br><br><strong>Access port:</strong> Carries one VLAN; connects to end devices.<br><strong>Trunk port:</strong> Carries multiple VLANs; tags frames with VLAN ID using 802.1Q.<br><strong>Native VLAN:</strong> Untagged VLAN on a trunk — must match on both ends.<br><br><strong>Inter-VLAN routing:</strong> Requires Layer 3 device — router-on-a-stick (subinterfaces) or multilayer switch (SVI)."},
  {d:2, q:"How does Spanning Tree Protocol (STP) work?", a:"STP prevents Layer 2 loops by blocking redundant links.<br><br><strong>Process:</strong> Elects root bridge (lowest bridge ID) → determines port roles.<br><strong>Port roles:</strong> Root Port, Designated Port, Blocking (non-designated).<br><br><strong>Versions:</strong><ul><li>802.1D — original STP (slow convergence)</li><li>802.1w — Rapid STP (RSTP, faster)</li><li>802.1s — Multiple STP (MSTP)</li></ul><strong>Enhancements:</strong> PortFast (for access ports, skips listening/learning), BPDU Guard (shuts down port on unexpected BPDU)"},
  {d:2, q:"What are routing protocols and administrative distance?", a:"<strong>Distance-Vector:</strong> RIP — max 15 hops, slow convergence, hop count metric.<br><strong>Link-State:</strong> OSPF — cost (bandwidth) metric, fast convergence, supports VLSM, hierarchical areas.<br><strong>Hybrid:</strong> EIGRP — Cisco proprietary, bandwidth+delay metric.<br><strong>Path-Vector:</strong> BGP — internet routing, AS numbers, policy-based.<br><br><strong>Administrative Distance (lower = preferred):</strong><ul><li>Connected: 0 | Static: 1 | EIGRP: 90</li><li>OSPF: 110 | RIP: 120 | External BGP: 20</li></ul>"},
  {d:2, q:"What are FHRP protocols and their purpose?", a:"First Hop Redundancy Protocols provide a virtual gateway IP so hosts have uninterrupted access if the primary router fails.<br><br><ul><li><strong>HSRP</strong> (Cisco) — Hot Standby Router Protocol; active/standby model</li><li><strong>VRRP</strong> — Virtual Router Redundancy Protocol; open standard; master/backup</li><li><strong>GLBP</strong> (Cisco) — Gateway Load Balancing Protocol; load-balances across multiple gateways</li></ul>"},
  {d:2, q:"What are wireless 802.11 standards and their key specs?", a:"<table style='width:100%;font-size:13px;border-collapse:collapse'><tr style='border-bottom:0.5px solid var(--color-border-tertiary)'><th style='text-align:left;padding:4px 0'>Standard</th><th>Band</th><th>Max Speed</th></tr><tr><td>802.11a</td><td>5 GHz</td><td>54 Mbps</td></tr><tr><td>802.11b</td><td>2.4 GHz</td><td>11 Mbps</td></tr><tr><td>802.11g</td><td>2.4 GHz</td><td>54 Mbps</td></tr><tr><td>802.11n</td><td>2.4/5 GHz</td><td>600 Mbps</td></tr><tr><td>802.11ac</td><td>5 GHz</td><td>&gt;1 Gbps</td></tr><tr><td>802.11ax</td><td>2.4/5/6 GHz</td><td>&gt;10 Gbps</td></tr></table><br>2.4 GHz non-overlapping channels: 1, 6, 11. 6 GHz = Wi-Fi 6E clean spectrum."},
  {d:2, q:"What is wireless security — WEP, WPA2, WPA3?", a:"<ul><li><strong>WEP:</strong> Deprecated — do not use; easily cracked</li><li><strong>WPA:</strong> TKIP encryption — no longer recommended</li><li><strong>WPA2:</strong> AES encryption; secure. Two modes:<ul><li>Personal (PSK) — single passphrase</li><li>Enterprise (802.1X + RADIUS) — per-user auth</li></ul></li><li><strong>WPA3:</strong> Uses SAE instead of PSK; stronger against brute-force</li></ul><strong>Disable WPS</strong> — vulnerable auto-connect feature.<br>SSID = network name | BSSID = AP MAC | ESSID = shared SSID across multiple APs for roaming"},
  {d:2, q:"What are PoE standards and LACP?", a:"<strong>Power over Ethernet (PoE):</strong><ul><li>802.3af (PoE): 15.4W</li><li>802.3at (PoE+): 25.5W</li><li>802.3bt (PoE++): up to 90W</li></ul>Used to power IP phones, cameras, access points.<br><br><strong>LACP (Link Aggregation — 802.3ad):</strong> Combines multiple physical links into one logical link for increased bandwidth and redundancy. Violation actions on port security: Shutdown, Restrict, Protect."},
  {d:2, q:"What cabling types and connectors are on the exam?", a:"<strong>Copper twisted pair:</strong> Cat5e (1 Gbps/100m), Cat6 (10 Gbps/55m), Cat6a (10 Gbps/100m). Max 100m.<br><strong>Connector:</strong> RJ-45<br><br><strong>Fiber:</strong><ul><li>Single-mode (SMF) — long distance, laser, yellow jacket</li><li>Multi-mode (MMF) — shorter distance, LED, orange/aqua</li></ul><strong>Connectors:</strong> LC, ST, SC, MPO<br><strong>Transceivers:</strong> SFP, SFP+, QSFP<br><br><strong>Plenum cable:</strong> Fire-resistant; required in air-handling spaces."},
  {d:3, q:"What is SNMP and how does it work?", a:"SNMP (Simple Network Management Protocol) monitors and manages network devices.<br><br><strong>Ports:</strong> UDP 161 (queries), UDP 162 (traps/alerts)<br><strong>Components:</strong><ul><li>Agent — runs on managed device</li><li>NMS — management station polls agents</li><li>MIB — database defining device variables</li></ul><strong>Versions:</strong><ul><li>v1/v2c — community strings (insecure, cleartext)</li><li>v3 — encrypted and authenticated (use this!)</li></ul>Traps = unsolicited alerts sent by device to NMS."},
  {d:3, q:"What is Syslog, NetFlow, and SIEM?", a:"<strong>Syslog:</strong> UDP port 514. Devices forward logs to a central server. Useful for audit trails and security events.<br><br><strong>NetFlow/IPFIX:</strong> Captures flow statistics (who talks to whom, how much data). Used for bandwidth analysis, app monitoring, and detecting DDoS/scanning.<br><br><strong>SIEM (Security Information and Event Management):</strong> Collects and correlates logs from many sources; sends alerts on anomalies. Helps with compliance (PCI, HIPAA). Examples: Splunk, AlienVault, QRadar."},
  {d:3, q:"What are the backup types and disaster recovery sites?", a:"<strong>Backup types:</strong><ul><li><strong>Full:</strong> Entire dataset; slowest to run, fastest to restore</li><li><strong>Incremental:</strong> Changes since last backup; fast backup, slow restore</li><li><strong>Differential:</strong> Changes since last full; middle ground</li></ul><strong>DR Sites:</strong><ul><li><strong>Hot:</strong> Fully equipped and live — fastest recovery, most expensive</li><li><strong>Warm:</strong> Some hardware; needs data/config restore</li><li><strong>Cold:</strong> Empty facility — longest RTO, cheapest</li></ul>"},
  {d:3, q:"What are RPO, RTO, MTTR, and MTBF?", a:"<ul><li><strong>RPO (Recovery Point Objective):</strong> Maximum acceptable data loss — determines backup frequency. 'How old can my data be?'</li><li><strong>RTO (Recovery Time Objective):</strong> Maximum acceptable downtime — determines DR planning. 'How fast must I recover?'</li><li><strong>MTTR (Mean Time to Repair):</strong> Average time to fix after failure.</li><li><strong>MTBF (Mean Time Between Failures):</strong> Average time between hardware failures — indicates reliability.</li></ul>"},
  {d:3, q:"What is change management and why does it matter?", a:"Change management ensures changes are planned, tested, approved, and documented to minimize disruptions.<br><br><strong>Steps:</strong><ol style='padding-left:1.2rem'><li>Request/proposal</li><li>Review and approval</li><li>Implementation plan</li><li>Communication</li><li>Testing and rollback plan</li><li>Documentation</li></ol>Tracks who changed what and when. Required before most network changes in enterprise environments."},
  {d:3, q:"What remote access methods and protocols are key?", a:"<strong>VPN types:</strong> Site-to-site (connects two LANs) vs Remote access (individual users).<br><br><strong>VPN protocols:</strong><ul><li>IPsec — Layer 3, site-to-site or remote</li><li>SSL/TLS — browser-based remote access</li><li>L2TP/IPsec — Layer 2 tunneling</li><li>GRE — tunnels non-IP traffic; not encrypted alone</li></ul><strong>Remote tools:</strong> SSH (22, encrypted CLI), RDP (3389, GUI Windows), Telnet (23, insecure — avoid), VNC (cross-platform desktop)<br><strong>Split tunneling:</strong> Only company traffic through VPN; other traffic goes direct."},
  {d:3, q:"What is port mirroring (SPAN) and baselining?", a:"<strong>Port Mirroring (SPAN):</strong> Switch copies traffic from one port/VLAN to another — used to connect Wireshark, IDS/IPS. Passive monitoring without disrupting traffic.<br><br><strong>Baselining:</strong> Capturing normal performance metrics (CPU, bandwidth, error rates, latency). Used to:<ul><li>Detect anomalies (deviations trigger alerts)</li><li>Capacity planning</li><li>Security alerting</li></ul><strong>Performance metrics:</strong> Availability, Latency, Jitter, Error rate, Throughput, Utilization."},
  {d:4, q:"What is the CIA Triad?", a:"<ul><li><strong>Confidentiality:</strong> Prevent unauthorized access to data. Tools: encryption, access controls, MFA.</li><li><strong>Integrity:</strong> Ensure data is not altered without detection. Tools: hashing (SHA-256), digital signatures.</li><li><strong>Availability:</strong> Ensure systems are up and accessible. Tools: redundancy, failover, DDoS protection, UPS.</li></ul>The CIA triad is the foundation of all security decisions."},
  {d:4, q:"What is AAA and what protocols implement it?", a:"<strong>AAA = Authentication, Authorization, Accounting</strong><ul><li><strong>Authentication:</strong> Verify identity (password, MFA, certificate, biometrics)</li><li><strong>Authorization:</strong> Grant access based on role or permissions</li><li><strong>Accounting:</strong> Log and audit actions (who did what, when)</li></ul><strong>RADIUS:</strong> UDP 1812; centralized auth for network access (VPN, 802.1X); combines auth+accounting.<br><strong>TACACS+:</strong> TCP 49; Cisco proprietary; separates auth/authorization/accounting; preferred for device management."},
  {d:4, q:"What are common network attacks to know for the exam?", a:"<ul><li><strong>MAC Flooding:</strong> Overloads switch MAC table → forces unicast flooding. Defense: port security.</li><li><strong>VLAN Hopping:</strong> Switch spoofing or double-tagging to access other VLANs. Defense: disable DTP, explicit native VLAN tagging.</li><li><strong>ARP Poisoning:</strong> Maps wrong MAC to IP → enables MITM. Defense: Dynamic ARP Inspection.</li><li><strong>Rogue DHCP:</strong> Unauthorized DHCP server. Defense: DHCP snooping.</li><li><strong>Evil Twin AP:</strong> Fake AP mimicking real one. Defense: wireless IDS, 802.1X.</li><li><strong>DoS/DDoS:</strong> Flood with traffic (ICMP, SYN, application layer).</li></ul>"},
  {d:4, q:"What are social engineering attack types?", a:"<ul><li><strong>Phishing:</strong> Fraudulent emails tricking users into revealing credentials</li><li><strong>Spear phishing:</strong> Targeted phishing at specific individuals</li><li><strong>Whaling:</strong> Targeted at executives</li><li><strong>Vishing:</strong> Voice/phone phishing</li><li><strong>Smishing:</strong> SMS phishing</li><li><strong>Pretexting:</strong> Creating a fabricated scenario to gain trust</li><li><strong>Tailgating:</strong> Physically following someone into a secure area</li></ul><strong>Defenses:</strong> User education, MFA, spam filters, physical security."},
  {d:4, q:"What malware types should you know?", a:"<ul><li><strong>Virus:</strong> Needs host file to spread</li><li><strong>Worm:</strong> Self-replicates across networks without user action</li><li><strong>Trojan:</strong> Disguised as legitimate app</li><li><strong>Ransomware:</strong> Encrypts files, demands payment</li><li><strong>Spyware:</strong> Silently collects user data</li><li><strong>Rootkit:</strong> Hides malicious presence at OS level</li><li><strong>Keylogger:</strong> Records keystrokes</li><li><strong>Adware:</strong> Displays unwanted ads</li></ul>"},
  {d:4, q:"What is Defense in Depth and Zero Trust?", a:"<strong>Defense in Depth:</strong> Layered security — if one layer fails, others remain. Example stack:<ul><li>Physical security (locks, cameras)</li><li>Network segmentation + firewalls</li><li>IDS/IPS monitoring</li><li>Endpoint protection (AV, EDR)</li><li>Encryption + access controls</li><li>Patch management</li></ul><strong>Zero Trust:</strong> 'Never trust, always verify.' Every user and device must authenticate continuously regardless of location. Enforced via MFA, micro-segmentation, least privilege."},
  {d:4, q:"What is NAC and how does 802.1X work?", a:"<strong>NAC (Network Access Control):</strong> Validates a device's compliance before granting network access. Can quarantine non-compliant devices and dynamically assign VLANs based on identity.<br><br><strong>802.1X:</strong> Port-based authentication framework. Three components:<ul><li><strong>Supplicant:</strong> Client device seeking access</li><li><strong>Authenticator:</strong> Network switch/AP</li><li><strong>Authentication Server:</strong> RADIUS server</li></ul>Works with EAP (Extensible Authentication Protocol) variants."},
  {d:4, q:"What are firewall types?", a:"<ul><li><strong>Packet filter (stateless):</strong> Filters based on header info only (IP, port, protocol)</li><li><strong>Stateful:</strong> Tracks active connections; allows return traffic automatically</li><li><strong>Next-Generation (NGFW):</strong> Deep packet inspection, application-layer awareness, IDS/IPS built-in</li><li><strong>Host-based:</strong> Software firewall on individual device (Windows Defender Firewall)</li><li><strong>Cloud/FWaaS:</strong> Firewall as a Service — off-premise, cloud-delivered filtering</li></ul>ACLs: first-match, implicit deny at the end."},
  {d:4, q:"What device hardening steps are critical?", a:"<ul><li>Disable unused ports and services</li><li>Change all default credentials immediately</li><li>Use secure protocols: SSH over Telnet, HTTPS over HTTP, SNMPv3 over v1/v2c, SFTP over FTP</li><li>Update firmware and OS regularly</li><li>Implement logging and config backups</li><li>Enable port security to limit MAC addresses per port</li><li>Apply least privilege — users get only necessary access</li><li>Use MFA for admin accounts</li></ul>"},
  {d:5, q:"What are the 6 steps of the troubleshooting methodology?", a:"<ol style='padding-left:1.2rem'><li><strong>Identify the problem</strong> — gather info, ask what changed, define scope</li><li><strong>Establish a theory of probable cause</strong> — start simple, use OSI model bottom-up</li><li><strong>Test the theory</strong> — swap cables, ping, isolate variables; if wrong, return to step 2</li><li><strong>Establish a plan of action</strong> — implement fix with minimal disruption; plan rollback</li><li><strong>Verify full system functionality</strong> — test all related services; confirm with user</li><li><strong>Document findings and actions</strong> — record problem, resolution, and timeline</li></ol>"},
  {d:5, q:"What CLI tools are used in network troubleshooting?", a:"<ul><li><strong>ping:</strong> Tests connectivity; shows packet loss and latency</li><li><strong>tracert / traceroute:</strong> Traces path to destination; identifies slow or dropped hops</li><li><strong>ipconfig / ifconfig / ip:</strong> Views IP config; renew DHCP with /release then /renew</li><li><strong>nslookup / dig:</strong> Queries DNS; tests A, MX, CNAME, PTR records</li><li><strong>netstat -an:</strong> Shows open connections and listening ports</li><li><strong>arp:</strong> Views ARP table; detect MAC/IP mismatches</li><li><strong>ipconfig /flushdns:</strong> Clears DNS cache</li></ul>"},
  {d:5, q:"What are common interface errors and what cause them?", a:"<ul><li><strong>CRC errors:</strong> Frame checksum failures — bad cable, EMI interference, or damaged connector</li><li><strong>Late collisions:</strong> Duplex mismatch between connected devices</li><li><strong>Runts:</strong> Frames smaller than 64 bytes — usually duplex issues</li><li><strong>Giants:</strong> Frames larger than 1518 bytes — MTU misconfiguration</li><li><strong>Interface flapping:</strong> Link repeatedly goes up/down — faulty cable, port, or SFP transceiver</li></ul><strong>Fix duplex mismatch:</strong> Set both sides to auto, or explicitly match speed and duplex on both ends."},
  {d:5, q:"How do you troubleshoot DHCP issues?", a:"<strong>Symptoms:</strong> Client gets 169.254.x.x APIPA address, no internet or local connectivity.<br><br><strong>Causes:</strong><ul><li>DHCP scope exhausted (pool full)</li><li>DHCP server unreachable (wrong VLAN, firewall)</li><li>Relay agent (ip helper-address) misconfigured on router</li><li>Rogue DHCP server assigning wrong info</li></ul><strong>Fix:</strong> Run ipconfig /renew, check server status, verify relay agent config, check for IP conflicts."},
  {d:5, q:"How do you troubleshoot DNS issues?", a:"<strong>Symptoms:</strong> Can ping IP but not hostname; website loads by IP but not domain name.<br><br><strong>Steps:</strong><ul><li>Run nslookup to query DNS directly</li><li>Verify correct DNS server in client config (ipconfig)</li><li>Flush DNS cache: ipconfig /flushdns</li><li>Test with public DNS: 8.8.8.8 (Google) or 1.1.1.1 (Cloudflare)</li><li>Check for DNS poisoning if redirected to wrong site</li></ul>Confirm with: ping google.com vs ping 8.8.8.8 — if IP works but name fails = DNS issue."},
  {d:5, q:"How do you troubleshoot wireless connectivity issues?", a:"<strong>No connection:</strong><ul><li>Check SSID, password (wrong key), and security type match</li><li>Verify AP is broadcasting and not hidden</li><li>Check 802.1X/RADIUS if enterprise auth</li></ul><strong>Slow/intermittent:</strong><ul><li>Interference (microwaves, other APs on same channel)</li><li>Use non-overlapping channels: 1, 6, 11 for 2.4 GHz</li><li>Too many clients on one AP (overload)</li><li>Weak signal — move closer or add AP</li></ul><strong>Roaming issues:</strong> Enable 802.11k/r/v; tune signal overlap between APs."},
  {d:5, q:"How do you troubleshoot VLAN and trunk problems?", a:"<strong>Symptoms:</strong> Hosts on same VLAN can't communicate; switch shows VLAN up but no traffic.<br><br><strong>Causes:</strong><ul><li>Port assigned to wrong VLAN</li><li>Trunk misconfiguration (VLAN not allowed on trunk)</li><li>Native VLAN mismatch between switches</li><li>STP blocking a port it shouldn't</li></ul><strong>Commands:</strong><ul><li>show vlan brief — see VLAN assignments</li><li>show interface trunk — see allowed VLANs</li><li>show spanning-tree — see port states</li></ul>"},
  {d:5, q:"What physical cable tools are used for troubleshooting?", a:"<ul><li><strong>Cable tester:</strong> Checks continuity and pinout (detects opens, shorts, miswiring)</li><li><strong>TDR (Time Domain Reflectometer):</strong> Locates cable breaks or impedance faults on copper</li><li><strong>OTDR (Optical TDR):</strong> Same for fiber — locates breaks and measure signal loss</li><li><strong>Tone generator and probe:</strong> Traces cable paths through walls or patch panels</li><li><strong>Loopback plug:</strong> Tests NIC or router interface in isolation</li><li><strong>Multimeter:</strong> Checks electrical signals and resistance</li><li><strong>Light meter / fiber cleaner:</strong> For inspecting and cleaning fiber connectors</li></ul>"},
  {d:5, q:"What causes high latency and packet loss?", a:"<strong>High latency causes:</strong><ul><li>WAN congestion or saturated link</li><li>Overloaded router/firewall (CPU high)</li><li>Too many hops between source and destination</li><li>ISP issues (use traceroute to isolate)</li></ul><strong>Packet loss causes:</strong><ul><li>Faulty cable or damaged port</li><li>Network congestion (queue drops)</li><li>Wireless interference</li><li>Duplex mismatch</li></ul><strong>Fixes:</strong> QoS prioritization, upgrade bandwidth, replace cables, check error counters on interfaces."},
  {d:5, q:"What network performance metrics must you know?", a:"<ul><li><strong>Latency:</strong> Delay — time for packet to travel source to destination</li><li><strong>Jitter:</strong> Variation in latency — critical for VoIP/video (high jitter = choppy calls)</li><li><strong>Packet loss:</strong> Missing data — causes retransmissions and quality degradation</li><li><strong>Bandwidth:</strong> Maximum capacity of the link</li><li><strong>Throughput:</strong> Actual data rate achieved (always ≤ bandwidth)</li><li><strong>Utilization:</strong> Percentage of bandwidth in use</li></ul>Monitor with SNMP, NetFlow, Wireshark, and SIEM dashboards."},
  {d:5, q:"What is Wireshark and when do you use it?", a:"Wireshark is a packet capture and protocol analyzer — captures all traffic on a network interface for deep inspection.<br><br><strong>Use for:</strong><ul><li>Diagnosing slow network performance (check retransmissions)</li><li>Inspecting protocol behavior and handshakes</li><li>Detecting malware or unauthorized traffic</li><li>Verifying DHCP/DNS responses</li><li>Identifying duplicate IP addresses</li></ul><strong>Related: tcpdump</strong> — command-line packet capture for Linux/Mac. Both work best with port mirroring (SPAN) to capture switch traffic."},
  {d:1, q:"What is the DHCP relay agent and why is it needed?", a:"When a DHCP server is on a different subnet from the client, broadcast DHCP Discover messages won't cross routers.<br><br>A <strong>relay agent</strong> on the router forwards DHCP broadcasts to the unicast address of the DHCP server.<br><br>Configured with <code style='font-family:var(--font-mono);font-size:13px;background:var(--color-background-secondary);padding:2px 5px;border-radius:4px'>ip helper-address [DHCP server IP]</code> on the router interface in the client's subnet.<br><br>This allows one central DHCP server to serve multiple subnets."},
  {d:4, q:"What are MFA factors and certificate-based auth?", a:"<strong>MFA factors (need 2+ categories):</strong><ul><li>Something you <strong>know</strong> — password, PIN</li><li>Something you <strong>have</strong> — token, smartcard, OTP app</li><li>Something you <strong>are</strong> — biometric (fingerprint, retina)</li></ul><strong>Certificate-based auth:</strong> Uses X.509 digital certificates issued by a PKI (Public Key Infrastructure). Used with VPNs, 802.1X, and S/MIME email.<br><br><strong>SSO (Single Sign-On):</strong> Authenticate once to access multiple systems — uses LDAP, SAML, or Kerberos."},
  {d:3, q:"What documentation types are used in network operations?", a:"<ul><li><strong>Physical diagram:</strong> Shows real cable/device layout, rack positions, patch panel connections</li><li><strong>Logical diagram:</strong> Shows IP subnets, VLANs, routing relationships, data flows</li><li><strong>Cable map:</strong> Tracks where each cable starts and terminates</li><li><strong>Rack diagram:</strong> Visual layout of devices by rack unit (U)</li><li><strong>IPAM:</strong> Tracks IP assignments, subnet allocations, prevents conflicts</li><li><strong>Asset inventory:</strong> Model, serial number, warranty, assigned user</li><li><strong>SLA:</strong> Defines uptime %, response time, support levels</li></ul>"},

  {d:1, q:"What IPv4 address classes should you recognize quickly?", a:"<ul><li><strong>Class A:</strong> 1.0.0.0–126.255.255.255, default /8</li><li><strong>Class B:</strong> 128.0.0.0–191.255.255.255, default /16</li><li><strong>Class C:</strong> 192.0.0.0–223.255.255.255, default /24</li><li><strong>Class D:</strong> 224.0.0.0–239.255.255.255, multicast</li><li><strong>Class E:</strong> 240.0.0.0–255.255.255.255, experimental/reserved</li></ul><strong>Exam trap:</strong> 127.x.x.x is loopback, not a usable Class A host range."},
  {d:1, q:"What subnet masks should you memorize for Network+?", a:"<ul><li><strong>/24</strong> = 255.255.255.0 = 254 usable hosts</li><li><strong>/25</strong> = 255.255.255.128 = 126 usable hosts</li><li><strong>/26</strong> = 255.255.255.192 = 62 usable hosts</li><li><strong>/27</strong> = 255.255.255.224 = 30 usable hosts</li><li><strong>/28</strong> = 255.255.255.240 = 14 usable hosts</li><li><strong>/29</strong> = 255.255.255.248 = 6 usable hosts</li><li><strong>/30</strong> = 255.255.255.252 = 2 usable hosts, often point-to-point</li><li><strong>/32</strong> = one host route</li></ul>Formula: <strong>usable hosts = 2^host bits - 2</strong>."},
  {d:1, q:"What is the fastest way to identify the network ID, broadcast, and host range?", a:"Use the <strong>magic number</strong>: 256 minus the interesting octet in the subnet mask.<br><br>Example: /26 = 255.255.255.192 → magic number is 64.<br>Subnets: .0, .64, .128, .192<br>If IP is 192.168.1.70, it falls in .64 subnet.<ul><li><strong>Network ID:</strong> 192.168.1.64</li><li><strong>Broadcast:</strong> 192.168.1.127</li><li><strong>Usable range:</strong> .65–.126</li></ul>"},
  {d:1, q:"What are common IPv6 address types?", a:"<ul><li><strong>Global unicast:</strong> Public IPv6, usually starts with 2000::/3</li><li><strong>Link-local:</strong> FE80::/10, local segment only, not routed</li><li><strong>Multicast:</strong> FF00::/8, one-to-many</li><li><strong>Loopback:</strong> ::1</li><li><strong>Unspecified:</strong> ::</li><li><strong>Unique local:</strong> FC00::/7, private internal IPv6</li></ul><strong>Exam trap:</strong> IPv6 does not use broadcast; it uses multicast."},
  {d:1, q:"What are IPv6 transition methods?", a:"<ul><li><strong>Dual stack:</strong> Run IPv4 and IPv6 at the same time</li><li><strong>Tunneling:</strong> Encapsulate IPv6 traffic inside IPv4</li><li><strong>NAT64/DNS64:</strong> Allows IPv6-only clients to reach IPv4 resources</li></ul><strong>Best simple answer:</strong> Dual stack is the cleanest when both protocols must coexist."},
  {d:2, q:"Static routing vs dynamic routing — when would you use each?", a:"<strong>Static routing:</strong><ul><li>Manually configured</li><li>Good for small/stub networks</li><li>Low overhead</li><li>No automatic failover unless configured</li></ul><strong>Dynamic routing:</strong><ul><li>Routers exchange routes automatically</li><li>Better for larger networks</li><li>Can adapt to outages</li><li>Uses protocols like OSPF, EIGRP, BGP, RIP</li></ul>"},
  {d:2, q:"What are the major routing protocols and their key differences?", a:"<ul><li><strong>RIP:</strong> Distance-vector, metric = hop count, max 15 hops</li><li><strong>OSPF:</strong> Link-state, metric = cost, common inside organizations</li><li><strong>EIGRP:</strong> Advanced distance-vector, Cisco-oriented, metric uses bandwidth/delay</li><li><strong>BGP:</strong> Path-vector, used between autonomous systems on the internet</li></ul><strong>Exam shortcut:</strong> OSPF = internal enterprise routing; BGP = internet/ISP routing."},
  {d:2, q:"What is administrative distance?", a:"Administrative distance (AD) tells a router which route source is most trusted when multiple routes to the same destination exist.<br><br><strong>Lower AD wins.</strong><ul><li>Connected: 0</li><li>Static: 1</li><li>eBGP: 20</li><li>EIGRP: 90</li><li>OSPF: 110</li><li>RIP: 120</li></ul><strong>Exam trap:</strong> Longest prefix match is checked before AD."},
  {d:2, q:"What is longest prefix match?", a:"Routers choose the route with the most specific matching subnet mask.<br><br>Example: Destination 192.168.1.50 matches:<ul><li>192.168.0.0/16</li><li>192.168.1.0/24</li><li>192.168.1.48/28</li></ul>The router chooses <strong>/28</strong> because it is the most specific."},
  {d:2, q:"What are VLANs, access ports, and trunk ports?", a:"<ul><li><strong>VLAN:</strong> Logically separates a switch into different broadcast domains</li><li><strong>Access port:</strong> Carries traffic for one VLAN; used for end devices</li><li><strong>Trunk port:</strong> Carries multiple VLANs between switches/routers/APs</li><li><strong>802.1Q:</strong> VLAN tagging standard used on trunk links</li><li><strong>Native VLAN:</strong> Untagged VLAN on an 802.1Q trunk</li></ul><strong>Exam trap:</strong> VLANs separate Layer 2; routing between VLANs requires Layer 3."},
  {d:2, q:"What is STP and why does it matter?", a:"<strong>Spanning Tree Protocol (STP)</strong> prevents Layer 2 switching loops by blocking redundant paths.<br><br>Without STP, loops can cause:<ul><li>Broadcast storms</li><li>MAC table instability</li><li>Network slowness or outages</li></ul>Common versions: STP, RSTP, MSTP."},
  {d:2, q:"What is link aggregation / LACP?", a:"<strong>Link aggregation</strong> combines multiple physical links into one logical link for redundancy and more throughput.<br><br><strong>LACP / 802.3ad</strong> dynamically negotiates the bundle.<br><br>Use it when you see wording like: <em>connect two ports to the core switch for redundancy</em> or <em>increase bandwidth between switches</em>."},
  {d:2, q:"What are common PoE standards?", a:"<ul><li><strong>802.3af:</strong> PoE, up to about 15.4W</li><li><strong>802.3at:</strong> PoE+, up to about 30W</li><li><strong>802.3bt:</strong> PoE++ / 4PPoE, higher power for cameras, APs, thin clients</li></ul>Used for APs, VoIP phones, cameras, badge readers, and IoT devices."},
  {d:2, q:"What wireless standards should you recognize?", a:"<ul><li><strong>802.11a:</strong> 5 GHz</li><li><strong>802.11b/g:</strong> 2.4 GHz</li><li><strong>802.11n / Wi-Fi 4:</strong> 2.4/5 GHz, MIMO</li><li><strong>802.11ac / Wi-Fi 5:</strong> 5 GHz, faster</li><li><strong>802.11ax / Wi-Fi 6/6E:</strong> 2.4/5/6 GHz, OFDMA</li></ul><strong>2.4 GHz:</strong> longer range, more interference. <strong>5/6 GHz:</strong> faster, shorter range."},
  {d:2, q:"What are the best wireless security options?", a:"<ul><li><strong>WPA2-Personal:</strong> Home/small office pre-shared key</li><li><strong>WPA2/WPA3-Enterprise:</strong> Uses 802.1X/RADIUS authentication</li><li><strong>WPA3:</strong> Stronger modern encryption and safer authentication</li><li><strong>Open:</strong> No encryption; avoid for secure networks</li></ul><strong>Exam answer:</strong> Enterprise wireless security usually points to <strong>802.1X + RADIUS</strong>."},
  {d:3, q:"What are SNMP, Syslog, NetFlow, and SPAN used for?", a:"<ul><li><strong>SNMP:</strong> Monitors device stats like CPU, interface status, bandwidth</li><li><strong>Syslog:</strong> Sends logs/events to a central server</li><li><strong>NetFlow:</strong> Shows traffic flow patterns: who talked to who, ports, volume</li><li><strong>SPAN / port mirroring:</strong> Copies switch traffic to an analyzer like Wireshark</li></ul><strong>Shortcut:</strong> SNMP = metrics, Syslog = logs, NetFlow = conversations, SPAN = packet capture."},
  {d:3, q:"What are RTO and RPO?", a:"<ul><li><strong>RTO:</strong> Recovery Time Objective = how long the business can be down</li><li><strong>RPO:</strong> Recovery Point Objective = how much data loss is acceptable</li></ul>Example: RTO 4 hours means restore service within 4 hours. RPO 15 minutes means backups/replication should lose no more than 15 minutes of data."},
  {d:3, q:"Hot site vs warm site vs cold site?", a:"<ul><li><strong>Hot site:</strong> Fully ready, fastest recovery, most expensive</li><li><strong>Warm site:</strong> Some equipment/data ready, moderate recovery time</li><li><strong>Cold site:</strong> Space/power only, slowest recovery, cheapest</li></ul><strong>Exam shortcut:</strong> Hot = ready now. Cold = rebuild almost everything."},
  {d:3, q:"Full, incremental, and differential backups — what is the difference?", a:"<ul><li><strong>Full:</strong> Copies everything</li><li><strong>Incremental:</strong> Copies changes since last backup of any type; fastest backup, slower restore</li><li><strong>Differential:</strong> Copies changes since last full backup; grows larger each day, easier restore than incremental</li></ul>"},
  {d:3, q:"What is a baseline and why is it important?", a:"A <strong>baseline</strong> is the normal performance level of a network/device.<br><br>It helps you spot abnormal behavior like:<ul><li>Unexpected bandwidth spikes</li><li>High latency</li><li>Packet loss</li><li>CPU or memory usage above normal</li></ul><strong>Do not skip this:</strong> Many troubleshooting questions compare current behavior to baseline behavior."},
  {d:3, q:"What are change management steps?", a:"<ul><li>Document the proposed change</li><li>Assess risk and impact</li><li>Get approval</li><li>Schedule maintenance window</li><li>Create a rollback plan</li><li>Implement the change</li><li>Test and verify</li><li>Document results</li></ul><strong>Exam trap:</strong> Do not make random production changes without approval and rollback."},
  {d:4, q:"What is 802.1X?", a:"<strong>802.1X</strong> is port-based network access control.<br><br>It uses:<ul><li><strong>Supplicant:</strong> Client device requesting access</li><li><strong>Authenticator:</strong> Switch or AP</li><li><strong>Authentication server:</strong> Usually RADIUS</li></ul>Used to stop unknown devices from plugging into a switch or joining enterprise Wi-Fi."},
  {d:4, q:"RADIUS vs TACACS+ — what is the difference?", a:"<ul><li><strong>RADIUS:</strong> Common for network access authentication; uses UDP; combines authentication and authorization</li><li><strong>TACACS+:</strong> Common for admin access to network devices; uses TCP; separates authentication, authorization, and accounting</li></ul><strong>Shortcut:</strong> RADIUS = users connecting to network. TACACS+ = admins managing devices."},
  {d:4, q:"What are ACLs used for?", a:"<strong>Access Control Lists (ACLs)</strong> permit or deny traffic based on rules such as source IP, destination IP, protocol, and port.<br><br>Common uses:<ul><li>Limit access between VLANs</li><li>Block risky ports</li><li>Control management access</li><li>Restrict traffic at routers/firewalls</li></ul><strong>Exam trap:</strong> ACLs filter traffic; they do not encrypt traffic."},
  {d:4, q:"What are common Layer 2 attacks and defenses?", a:"<ul><li><strong>MAC flooding:</strong> Overflows CAM table → use port security</li><li><strong>ARP poisoning:</strong> Attacker maps wrong MAC to IP → use dynamic ARP inspection</li><li><strong>VLAN hopping:</strong> Attacker tries to access another VLAN → disable unused trunks, set native VLAN properly</li><li><strong>Rogue DHCP:</strong> Fake DHCP server → use DHCP snooping</li></ul>"},
  {d:4, q:"What is PKI and what are X.509 certificates used for?", a:"<strong>PKI</strong> is the system used to create, manage, and validate digital certificates.<br><br><strong>X.509 certificates</strong> are commonly used for:<ul><li>HTTPS/TLS</li><li>VPN authentication</li><li>Certificate-based Wi-Fi authentication</li><li>Device/user identity verification</li></ul>Certificates support trust, encryption, and identity validation."},
  {d:4, q:"Hashing vs encryption vs digital signatures?", a:"<ul><li><strong>Hashing:</strong> Proves integrity; one-way fingerprint</li><li><strong>Encryption:</strong> Protects confidentiality; reversible with key</li><li><strong>Digital signature:</strong> Provides integrity, authentication, and non-repudiation</li></ul><strong>Exam shortcut:</strong> If question says “verify data was not changed,” think <strong>hash/integrity</strong>."},
  {d:4, q:"What is a DMZ / screened subnet?", a:"A <strong>DMZ</strong> is a separate network segment for public-facing services like web servers, email gateways, or VPN portals.<br><br>Purpose:<ul><li>Allow controlled internet access to public services</li><li>Keep internal LAN protected</li><li>Limit damage if a public server is compromised</li></ul>"},
  {d:5, q:"What is the Network+ troubleshooting methodology?", a:"<ol><li>Identify the problem</li><li>Establish a theory of probable cause</li><li>Test the theory</li><li>Establish a plan of action and implement the solution</li><li>Verify full system functionality and implement preventive measures</li><li>Document findings, actions, and outcomes</li></ol><strong>Exam trap:</strong> After identifying the issue, checking OSI layers usually fits <strong>establish a theory</strong>."},
  {d:5, q:"What commands should you know for troubleshooting?", a:"<ul><li><strong>ipconfig / ifconfig / ip:</strong> View IP settings</li><li><strong>ping:</strong> Test reachability</li><li><strong>tracert / traceroute:</strong> See path to destination</li><li><strong>nslookup / dig:</strong> Test DNS</li><li><strong>netstat:</strong> View connections/listening ports</li><li><strong>arp:</strong> View IP-to-MAC mappings</li><li><strong>route:</strong> View routing table</li><li><strong>tcpdump/Wireshark:</strong> Capture packets</li></ul>"},
  {d:5, q:"What basic Cisco-style show commands are useful in PBQs?", a:"<ul><li><strong>show ip interface brief:</strong> Interface IPs and up/down status</li><li><strong>show interfaces:</strong> Errors, duplex, speed, drops</li><li><strong>show vlan:</strong> VLANs and assigned ports</li><li><strong>show mac address-table:</strong> MAC-to-port mapping</li><li><strong>show ip arp:</strong> IP-to-MAC mapping</li><li><strong>show ip route:</strong> Routing table</li><li><strong>show cdp/lldp neighbors:</strong> Neighbor switch/device info</li></ul>"},
  {d:5, q:"How do you troubleshoot a device with a 169.254.x.x address?", a:"A 169.254.x.x address means <strong>APIPA</strong>: the device did not get DHCP.<br><br>Check:<ol><li>Is cable/Wi-Fi connected?</li><li>Is the switch port enabled and correct VLAN?</li><li>Is DHCP server online?</li><li>Is DHCP scope full?</li><li>Is DHCP relay/ip helper configured for other subnets?</li><li>Try renew: <strong>ipconfig /release</strong> then <strong>ipconfig /renew</strong></li></ol>"},
  {d:5, q:"How do you troubleshoot “can reach local network but not internet”?", a:"Check in this order:<ol><li><strong>Default gateway</strong> is configured and reachable</li><li>IP/subnet mask are correct</li><li>DNS if websites fail by name only</li><li>NAT/firewall rules</li><li>ISP/WAN status</li></ol><strong>Exam shortcut:</strong> Local works but internet fails often points to <strong>default gateway</strong>."},
  {d:5, q:"How do you troubleshoot “can ping IP but not website name”?", a:"If pinging an IP works but domain names fail, suspect <strong>DNS</strong>.<br><br>Check:<ul><li>DNS server IP configured</li><li>Can ping DNS server?</li><li>Use nslookup/dig</li><li>Try another DNS server</li><li>Flush DNS cache if needed</li></ul>"},
  {d:5, q:"What cable tester results should you recognize?", a:"<ul><li><strong>Open:</strong> Wire is broken/not connected</li><li><strong>Short:</strong> Wires touch each other</li><li><strong>Split pair:</strong> Pins are wired incorrectly across pairs</li><li><strong>Reversed pair:</strong> Pins in a pair are swapped</li><li><strong>Attenuation:</strong> Signal loss over distance</li><li><strong>Crosstalk:</strong> Interference between wire pairs</li></ul>"},
  {d:5, q:"What interface errors point to duplex/speed problems?", a:"Common clues:<ul><li><strong>Late collisions:</strong> Duplex mismatch</li><li><strong>CRC errors:</strong> Bad cable, interference, duplex issue</li><li><strong>Runts/giants:</strong> Frame size problems</li><li><strong>Input/output errors:</strong> Physical layer or interface issue</li></ul>Start with cable, port, speed/duplex settings, and interface counters."},
  {d:5, q:"What wireless issues should you recognize?", a:"<ul><li><strong>Interference:</strong> Microwave, Bluetooth, neighboring APs</li><li><strong>Channel overlap:</strong> Especially on 2.4 GHz</li><li><strong>Low RSSI:</strong> Weak signal</li><li><strong>High latency/jitter:</strong> Bad for VoIP/video</li><li><strong>Wrong encryption/auth:</strong> Can see SSID but cannot connect</li><li><strong>Roaming problems:</strong> Sticky clients or poor AP placement</li></ul>"},
  {d:5, q:"What tools are hardware troubleshooting tools?", a:"<ul><li><strong>Cable tester:</strong> Verifies wire mapping and faults</li><li><strong>Toner/probe:</strong> Traces cables</li><li><strong>Loopback plug:</strong> Tests NIC/interface send-receive</li><li><strong>Multimeter:</strong> Tests electrical voltage/continuity</li><li><strong>Optical power meter:</strong> Measures fiber signal power</li><li><strong>Wi-Fi analyzer:</strong> Checks channels, signal, interference</li></ul>"},
];

const domainColors = {1:'d1',2:'d2',3:'d3',4:'d4',5:'d5'};
const domainLabels = {1:'Domain 1 — Networking Concepts',2:'Domain 2 — Network Implementation',3:'Domain 3 — Network Operations',4:'Domain 4 — Network Security',5:'Domain 5 — Network Troubleshooting'};

function render() {
  const c = cards[idx];
  document.getElementById('card').classList.remove('flipped');
  setTimeout(() => {
    document.getElementById('dtag').className = 'fc-domain-tag ' + domainColors[c.d];
    document.getElementById('dtag').textContent = domainLabels[c.d];
    document.getElementById('question').textContent = c.q;
    document.getElementById('answer').innerHTML = c.a;
    document.getElementById('counter').textContent = 'Card ' + (idx+1) + ' of ' + cards.length;
    document.getElementById('progress').style.width = Math.round(((idx+1)/cards.length)*100) + '%';
    document.getElementById('prevBtn').disabled = idx === 0;
    document.getElementById('nextBtn').disabled = idx === cards.length - 1;
  }, 50);
}

function flip() {
  document.getElementById('card').classList.toggle('flipped');
}

function navigate(dir) {
  idx = Math.max(0, Math.min(cards.length-1, idx+dir));
  render();
}

function shuffle() {
  for(let i=cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cards[i],cards[j]]=[cards[j],cards[i]];}
  idx=0; render();
}

function filterDomain(d) {
  cards = d === 'all' ? [...allCards] : allCards.filter(c => c.d === d);
  idx = 0;
  document.querySelectorAll('.fc-domain-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

render();
</script>
